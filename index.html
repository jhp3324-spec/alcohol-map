<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계 술 원산지 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    header h1 { font-size: 20px; font-weight: 600; letter-spacing: 1px; }
    header h1 span { color: #f4a261; }

    /* 검색 */
    .search-bar {
      padding: 8px 20px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      position: relative;
      z-index: 1500;
    }
    .search-input-wrap { position: relative; max-width: 480px; }
    .search-input-wrap input {
      width: 100%;
      padding: 9px 36px;
      background: #0f0f23;
      border: 1.5px solid #444;
      border-radius: 24px;
      color: #eee;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input-wrap input:focus { border-color: #f4a261; }
    .search-input-wrap input::placeholder { color: #666; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 15px; pointer-events: none; }
    .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #888; font-size: 16px; cursor: pointer; display: none; line-height: 1; }

    .search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      width: 100%;
      max-width: 480px;
      background: #1e1e3a;
      border: 1px solid #f4a261;
      border-radius: 12px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 2000;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .search-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #2a2a4a;
      transition: background 0.15s;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #2a2a4a; }
    .result-emoji { font-size: 22px; flex-shrink: 0; }
    .result-info { flex: 1; min-width: 0; }
    .result-name { font-size: 14px; color: #eee; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-name mark { background: none; color: #f4a261; font-weight: 700; }
    .result-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .result-type-badge { font-size: 10px; background: #333; color: #ccc; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
    .no-result { padding: 18px; text-align: center; color: #666; font-size: 13px; }

    /* 필터 */
    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 20px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }
    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #444;
      background: transparent;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #f4a261; color: #f4a261; }
    .filter-btn.active { background: #f4a261; border-color: #f4a261; color: #1a1a2e; font-weight: 700; }
    .count-badge { background: #f4a261; color: #1a1a2e; border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700; margin-left: 4px; }
    .filter-btn.active .count-badge { background: #1a1a2e; color: #f4a261; }

    #map { flex: 1; width: 100%; }

    /* 팝업 */
    .leaflet-popup-content-wrapper {
      background: #1e1e3a;
      border: 1px solid #f4a261;
      border-radius: 12px;
      color: #eee;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leaflet-popup-tip { background: #1e1e3a; }
    .leaflet-popup-close-button { color: #aaa !important; font-size: 18px !important; }
    .leaflet-popup-content { margin: 14px 16px; }

    .popup-content { min-width: 210px; }
    .popup-emoji { font-size: 34px; text-align: center; margin-bottom: 4px; }
    .popup-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 6px;
    }
    .tag-origin { background: #f4a261; color: #1a1a2e; }
    .tag-brand  { background: #7c3aed; color: #fff; }
    .popup-name { font-size: 17px; font-weight: 700; color: #f4a261; margin-bottom: 2px; }
    .popup-sub  { font-size: 12px; color: #aaa; margin-bottom: 10px; }
    .popup-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 4px 0;
      border-bottom: 1px solid #2a2a3a;
      gap: 8px;
    }
    .popup-row:last-of-type { border-bottom: none; }
    .popup-row span:first-child { color: #888; flex-shrink: 0; }
    .popup-row span:last-child { color: #ddd; text-align: right; }
    .popup-desc { font-size: 12px; color: #bbb; margin-top: 8px; line-height: 1.7; border-top: 1px solid #2a2a3a; padding-top: 8px; }

    .popup-links { display: flex; gap: 6px; margin-top: 10px; }
    .popup-link-btn {
      flex: 1;
      padding: 6px 0;
      border-radius: 6px;
      border: none;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: block;
    }
    .btn-google { background: #4285f4; color: #fff; }
    .btn-naver  { background: #03c75a; color: #fff; }
    .btn-wiki   { background: #636466; color: #fff; }
    .btn-google:hover { background: #2563eb; }
    .btn-naver:hover  { background: #02a44a; }
    .btn-wiki:hover   { background: #444; }

    /* 상세 정보 사이드 패널 */
    .side-panel {
      position: fixed;
      top: 0; right: -380px;
      width: 360px;
      height: 100%;
      background: #12122a;
      border-left: 1px solid #f4a261;
      z-index: 2500;
      transition: right 0.3s ease;
      display: flex;
      flex-direction: column;
      box-shadow: -4px 0 24px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .side-panel.open { right: 0; }

    .panel-header {
      padding: 16px 18px 12px;
      background: #1a1a2e;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      flex-shrink: 0;
    }
    .panel-emoji { font-size: 40px; line-height: 1; }
    .panel-title-wrap { flex: 1; min-width: 0; }
    .panel-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 4px;
    }
    .panel-name { font-size: 20px; font-weight: 700; color: #f4a261; line-height: 1.2; }
    .panel-country { font-size: 12px; color: #aaa; margin-top: 3px; }
    .panel-close {
      background: none;
      border: none;
      color: #888;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    .panel-close:hover { color: #fff; }

    .panel-body { flex: 1; overflow-y: auto; padding: 16px 18px; }

    .panel-section { margin-bottom: 18px; }
    .panel-section-title {
      font-size: 11px;
      color: #f4a261;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding-bottom: 4px;
      border-bottom: 1px solid #2a2a4a;
    }
    .panel-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 5px 0;
      border-bottom: 1px solid #1e1e38;
      gap: 12px;
    }
    .panel-row:last-child { border-bottom: none; }
    .panel-row .label { color: #888; flex-shrink: 0; min-width: 70px; }
    .panel-row .value { color: #ddd; text-align: right; }
    .panel-desc {
      font-size: 13px;
      color: #ccc;
      line-height: 1.8;
    }
    .panel-awards {
      background: #1e1e38;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #f4a261;
      line-height: 1.8;
    }
    .panel-links { display: flex; gap: 8px; flex-wrap: wrap; }
    .panel-link-btn {
      flex: 1;
      min-width: 90px;
      padding: 8px 0;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: block;
    }
    .panel-link-btn.google { background: #4285f4; color: #fff; }
    .panel-link-btn.naver  { background: #03c75a; color: #fff; }
    .panel-link-btn.wiki   { background: #555; color: #fff; }
    .panel-link-btn:hover { opacity: 0.85; }

    /* 팝업은 최소화 */
    .popup-mini { min-width: 160px; text-align: center; padding: 4px 0; }
    .popup-mini-name { font-size: 14px; font-weight: 700; color: #f4a261; margin-bottom: 4px; }
    .popup-mini-sub  { font-size: 11px; color: #aaa; margin-bottom: 10px; }
    .popup-detail-btn {
      display: block;
      width: 100%;
      padding: 7px 0;
      background: #f4a261;
      color: #1a1a2e;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .popup-detail-btn:hover { background: #e8924f; }

    /* 범례 */
    .legend {
      position: fixed;
      bottom: 30px;
      left: 20px;
      background: rgba(26,26,46,0.95);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      z-index: 1000;
      min-width: 130px;
    }
    .legend h4 { font-size: 12px; color: #f4a261; margin-bottom: 8px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; color: #ccc; }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .legend-sq  { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    /* 📷 사진 검색 버튼 (FAB) */
    .photo-fab {
      position: fixed; bottom: 36px; right: 24px; z-index: 1200;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
    }
    .photo-fab-btn {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, #f4a261, #e76f51);
      border: none; font-size: 28px; cursor: pointer;
      box-shadow: 0 4px 18px rgba(244,162,97,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .photo-fab-btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(244,162,97,0.7); }
    .photo-fab-btn:active { transform: scale(0.95); }
    .photo-fab-label {
      font-size: 11px; color: #f4a261; font-weight: 600;
      background: rgba(26,26,46,0.9); padding: 3px 8px; border-radius: 8px;
      white-space: nowrap;
    }

    /* 스캔 오버레이 */
    .scan-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 9000;
      flex-direction: column; align-items: center; justify-content: center; gap: 18px;
    }
    .scan-overlay.active { display: flex; }
    .scan-preview {
      width: 220px; height: 220px; object-fit: cover;
      border-radius: 18px; border: 3px solid #f4a261; display: none;
    }
    .scan-spinner {
      width: 60px; height: 60px; border: 5px solid #333;
      border-top-color: #f4a261; border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .scan-label { color: #eee; font-size: 15px; text-align: center; padding: 0 20px; }
    .scan-cancel {
      margin-top: 4px; padding: 8px 24px; background: #333;
      border: none; color: #ccc; border-radius: 20px; cursor: pointer; font-size: 14px;
    }

    /* 인식 결과 패널 */
    .recog-result {
      display: none; position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 8000;
      background: #1e1e3a; border-top: 3px solid #f4a261;
      border-radius: 20px 20px 0 0;
      padding: 18px 20px 28px;
      box-shadow: 0 -8px 32px rgba(0,0,0,0.7);
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .recog-result.active { display: block; }
    .recog-result-title { font-size: 11px; color: #888; margin-bottom: 6px; }
    .recog-result-name { font-size: 17px; font-weight: 700; color: #f4a261; margin-bottom: 6px; }
    .recog-result-sub { font-size: 13px; color: #aaa; margin-bottom: 14px; line-height: 1.6; white-space: pre-wrap; }
    .recog-result-btns { display: flex; gap: 10px; flex-wrap: wrap; }
    .recog-result-btn {
      flex: 1; padding: 12px 10px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit;
      text-align: center; text-decoration: none; white-space: nowrap; min-width: 100px;
    }
    .recog-result-btn.primary { background: #f4a261; color: #1a1a2e; }
    .recog-result-btn.naver { background: #03C75A; color: #fff; }
    .recog-result-btn.close-btn { background: #333; color: #ccc; flex: 0 0 48px; min-width: 0; }
  </style>
</head>
<body>

<header>
  <h1>🍷 세계 <span>술 원산지 & 브랜드</span> 지도</h1>
  <div style="font-size:12px;color:#888;">마커 클릭 → 상세 정보</div>
</header>

<div class="search-bar">
  <div class="search-input-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="술 이름, 브랜드, 나라, 종류로 검색...">
    <button class="search-clear" id="search-clear">✕</button>
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<!-- 📷 FAB 사진 검색 버튼 -->
<div class="photo-fab">
  <button class="photo-fab-btn" id="cam-btn" title="술 사진으로 검색">📷</button>
  <span class="photo-fab-label">사진검색</span>
</div>
<input type="file" id="cam-input" accept="image/*" capture="environment" style="display:none">

<!-- 스캔 중 오버레이 -->
<div class="scan-overlay" id="scan-overlay">
  <img class="scan-preview" id="scan-preview">
  <div class="scan-spinner"></div>
  <div class="scan-label" id="scan-label">📷 라벨 텍스트 인식 중...</div>
  <button class="scan-cancel" onclick="cancelScan()">취소</button>
</div>

<!-- 인식 결과 -->
<div class="recog-result" id="recog-result">
  <div class="recog-result-title">📷 사진 인식 결과</div>
  <div class="recog-result-name" id="recog-name">-</div>
  <div class="recog-result-sub" id="recog-sub"></div>
  <div class="recog-result-btns">
    <button class="recog-result-btn primary" id="recog-goto" style="display:none">지도에서 보기</button>
    <a class="recog-result-btn naver" id="recog-naver" href="#" target="_blank">🟢 네이버 검색</a>
    <button class="recog-result-btn close-btn" onclick="closeRecog()">✕</button>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-type="all">전체 <span class="count-badge" id="cnt-all">0</span></button>
  <button class="filter-btn" data-type="브랜드">🏷️ 브랜드 <span class="count-badge" id="cnt-brand">0</span></button>
  <button class="filter-btn" data-type="맥주">🍺 맥주</button>
  <button class="filter-btn" data-type="와인">🍷 와인</button>
  <button class="filter-btn" data-type="위스키">🥃 위스키</button>
  <button class="filter-btn" data-type="소주·청주">🍶 소주·청주</button>
  <button class="filter-btn" data-type="중국술">🇨🇳 중국술</button>
  <button class="filter-btn" data-type="증류주">🥂 증류주</button>
  <button class="filter-btn" data-type="전통주">🏺 전통주</button>
</div>

<div id="map"></div>

<!-- 상세 정보 사이드 패널 -->
<div class="side-panel" id="side-panel">
  <div class="panel-header">
    <div class="panel-emoji" id="p-emoji">🥃</div>
    <div class="panel-title-wrap">
      <div id="p-tag"></div>
      <div class="panel-name" id="p-name"></div>
      <div class="panel-country" id="p-country"></div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<div class="legend">
  <h4>마커 구분</h4>
  <div class="legend-item"><div class="legend-sq" style="background:#a855f7;border:1px solid #fff"></div>브랜드</div>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>맥주 원산지</div>
  <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>와인 원산지</div>
  <div class="legend-item"><div class="legend-dot" style="background:#92400e"></div>위스키 원산지</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>소주·청주</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e11d48"></div>중국술</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>증류주</div>
  <div class="legend-item"><div class="legend-dot" style="background:#059669"></div>전통주</div>
</div>

<script>
// ── 원산지 데이터 ──────────────────────────────
const origins = [
  { name:"필스너 우르켈", country:"체코 (플젠)", lat:49.75, lng:13.38, type:"맥주", emoji:"🍺", abv:"4.4%", desc:"세계 최초의 황금빛 라거 맥주. 1842년 탄생.", style:"라거", color:"#f59e0b" },
  { name:"기네스 흑맥주", country:"아일랜드 (더블린)", lat:53.34, lng:-6.27, type:"맥주", emoji:"🍺", abv:"4.2%", desc:"흑맥주의 대명사. 1759년 아서 기네스가 창업.", style:"스타우트", color:"#f59e0b" },
  { name:"바이엔슈테판", country:"독일 (뮌헨)", lat:48.4, lng:11.73, type:"맥주", emoji:"🍺", abv:"5.1%", desc:"세계에서 가장 오래된 양조장(1040년). 밀맥주로 유명.", style:"헤페바이젠", color:"#f59e0b" },
  { name:"보르도 와인", country:"프랑스 (보르도)", lat:44.84, lng:-0.58, type:"와인", emoji:"🍷", abv:"12~15%", desc:"카베르네 소비뇽 중심. 세계 최고 명성의 와인 산지.", style:"레드 와인", color:"#dc2626" },

    awards:"• 2012년 Jim Murray 위스키 바이블 최고상 (Solist Fino Sherry)\n• 2015년 세계 최고 싱글몰트 (Solist Vinho Barrique)\n• 국제 대회 금메달 950개 이상 수상",
    desc:"대만 최초·유일의 위스키 증류소(2005년 설립). 이란현 중앙산맥과 태평양 사이에 위치. 스코틀랜드산 포트 스틸 20기 보유, 연간 1천만 병 이상 생산 가능. 아열대 기후로 숙성 속도가 스코틀랜드의 3배 빨라 독특한 풍미 형성. 망고·파인애플·코코넛 등 열대과일 향이 특징. 2016년 2호 증류소, 2024년 3번째 숙성 창고 완공. 총 30만 배럴 이상 보관 중.",
    wiki:"https://en.wikipedia.org/wiki/Kavalan_Distillery",
    products:[
      { name:"Kavalan Classic", abv:"40%", desc:"2008년 최초 출시 대표 제품. 열대과일·크림 향." },
      { name:"Solist Vinho Barrique", abv:"57.8%", desc:"2015년 세계 최고 싱글몰트 선정." },
      { name:"Solist Fino Sherry", abv:"57.8%", desc:"2012년 Jim Murray 올해의 위스키." },
      { name:"King Car Conductor", abv:"46%", desc:"블렌디드 몰트. 부드럽고 접근하기 쉬운 스타일." },
    ],
    color:"#a855f7" },
];

// 전체 데이터 통합
const allData = [
  ...origins.map(d => ({ ...d, isBrand: false })),
  ...brands.map(d => ({ ...d, type: "브랜드", isBrand: true })),
];

// ── 지도 초기화 ────────────────────────────────
const map = L.map('map', { center: [30, 15], zoom: 2, minZoom: 1 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd', maxZoom: 18
}).addTo(map);

let markers = [];

// ── 사이드 패널 ────────────────────────────────
function openPanel(d) {
  document.getElementById('p-emoji').textContent = d.emoji;
  document.getElementById('p-name').textContent  = d.name;
  document.getElementById('p-country').textContent = '📍 ' + d.country;

  const tagEl = document.getElementById('p-tag');
  if (d.isBrand) {
    tagEl.innerHTML = `<span class="panel-tag tag-brand">브랜드 · ${d.category}</span>`;
  } else {
    tagEl.innerHTML = `<span class="panel-tag tag-origin">${d.type} 원산지</span>`;
  }

  const gLink = `https://www.google.com/search?q=${encodeURIComponent(d.name + ' 위스키 술')}`;
  const nLink = `https://search.naver.com/search.naver?query=${encodeURIComponent(d.name + ' 술')}`;
  const wikiBtn = d.wiki
    ? `<a class="panel-link-btn wiki" href="${d.wiki}" target="_blank">📖 위키백과</a>` : '';

    bodyHtml += `
      <div class="panel-section">
        <div class="panel-section-title">브랜드 정보</div>
        <div class="panel-row"><span class="label">창립연도</span><span class="value">${d.founded}</span></div>
        <div class="panel-row"><span class="label">창업자</span><span class="value">${d.founder}</span></div>
        <div class="panel-row"><span class="label">모회사</span><span class="value">${d.parent}</span></div>
        <div class="panel-row"><span class="label">대표 제품</span><span class="value">${d.flagship}</span></div>
        <div class="panel-row"><span class="label">도수</span><span class="value">${d.abv}</span></div>
      </div>`;
  } else {
    bodyHtml += `
      <div class="panel-section">
        <div class="panel-section-title">원산지 정보</div>
        <div class="panel-row"><span class="label">스타일</span><span class="value">${d.style||'-'}</span></div>
        <div class="panel-row"><span class="label">도수</span><span class="value">${d.abv}</span></div>
      </div>`;
  }

  bodyHtml += `
    <div class="panel-section">
      <div class="panel-section-title">상세 설명</div>
      <div class="panel-desc">${d.desc}</div>
    </div>`;

  if (d.awards) {
    bodyHtml += `
      <div class="panel-section">
        <div class="panel-section-title">🏆 수상 이력</div>
        <div class="panel-awards">${d.awards.replace(/\n/g,'<br>')}</div>
      </div>`;
  }

  if (d.products && d.products.length) {
    bodyHtml += `<div class="panel-section"><div class="panel-section-title">🍶 주요 제품</div>`;
    d.products.forEach(p => {
      bodyHtml += `
        <div style="background:#1e1e38;border-radius:8px;padding:10px 12px;margin-bottom:8px;">
          <div style="font-size:13px;font-weight:700;color:#f4a261;margin-bottom:3px;">${p.name} <span style="color:#aaa;font-weight:400;font-size:11px;">${p.abv}</span></div>
          <div style="font-size:12px;color:#bbb;">${p.desc}</div>
        </div>`;
    });
    bodyHtml += `</div>`;
  }

  bodyHtml += `
    <div class="panel-section">
      <div class="panel-section-title">더 알아보기</div>
      <div class="panel-links">
        <a class="panel-link-btn google" href="${gLink}" target="_blank">🔍 구글</a>
        <a class="panel-link-btn naver"  href="${nLink}" target="_blank">🔍 네이버</a>
        ${wikiBtn}
      </div>
    </div>`;

  document.getElementById('panel-body').innerHTML = bodyHtml;
  document.getElementById('side-panel').classList.add('open');
}

function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
}

function createMarker(d) {
  const br = d.isBrand ? '5px' : '50%';
  const sz = d.isBrand ? '28px' : '26px';
  const iconHtml = `<div style="background:${d.color};border:2px solid #fff;border-radius:${br};width:${sz};height:${sz};display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.6);cursor:pointer;">${d.emoji}</div>`;
  const icon = L.divIcon({ className:'', html:iconHtml, iconSize:[28,28], iconAnchor:[14,14] });

  const popupHtml = `
    <div class="popup-mini">
      <div style="font-size:28px;margin-bottom:4px;">${d.emoji}</div>
      <div class="popup-mini-name">${d.name}</div>
      <div class="popup-mini-sub">📍 ${d.country}</div>
      <button class="popup-detail-btn" onclick="openPanel(window.__markerData['${d.name.replace(/'/g,"\\'")}'])">상세 정보 보기 →</button>
    </div>`;

  const marker = L.marker([d.lat, d.lng], { icon }).bindPopup(popupHtml, { maxWidth: 200 });
  marker._drinkData = d;
  return marker;
}

function renderMarkers(type) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  allData.forEach(d => {
    if (type === 'all' || d.type === type) {
      const m = createMarker(d);
      m.addTo(map);
      markers.push(m);
    }
  });
}

// 전역 데이터 맵 (팝업 버튼에서 접근용)
window.__markerData = {};
allData.forEach(d => { window.__markerData[d.name] = d; });

// 카운트 표시
document.getElementById('cnt-all').textContent = allData.length;
document.getElementById('cnt-brand').textContent = brands.length;
renderMarkers('all');

// 필터 버튼
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMarkers(btn.dataset.type);
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('search-clear').style.display = 'none';
  });
});

// ── 검색 기능 ──────────────────────────────────
const searchInput   = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
const searchClear   = document.getElementById('search-clear');

function hl(text, q) {
  if (!q) return text;
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function flyToMarker(d) {
  const target = markers.find(m => m._drinkData && m._drinkData.name === d.name);
  if (!target) return;
  map.flyTo([d.lat, d.lng], 5, { duration: 1 });
  setTimeout(() => target.openPopup(), 1100);
}

// Korean phonetic normalization: ㅐ/ㅒ→ㅏ, ㅔ/ㅖ→ㅓ so 밸→발, 헨/핸 both match
function decomposeHangul(str) {
  const CHO  = 'ㄱㄲㄴㄷㄸㄹㅁㅂㅃㅅㅆㅇㅈㅉㅊㅋㅌㅍㅎ';
  const JUNG = 'ㅏㅐㅑㅒㅓㅔㅕㅖㅗㅘㅙㅚㅛㅜㅝㅞㅟㅠㅡㅢㅣ';
  const JONG = ' ㄱㄲㄳㄴㄵㄶㄷㄹㄺㄻㄼㄽㄾㄿㅀㅁㅂㅄㅅㅆㅇㅈㅊㅋㅌㅍㅎ';
  let r = '';
  for (const c of str) {
    const code = c.charCodeAt(0);
    if (code >= 0xAC00 && code <= 0xD7A3) {
      const off = code - 0xAC00;
      const jong = off % 28;
      const jung = Math.floor(off / 28) % 21;
      const cho = Math.floor(off / 28 / 21);
      r += CHO[cho] + JUNG[jung] + (jong ? JONG[jong] : '');
    } else r += c;
  }
  return r;
}
function phoneticNorm(str) {
  return decomposeHangul(str.toLowerCase())
    .replace(/ㅐ/g, 'ㅏ').replace(/ㅒ/g, 'ㅏ')
    .replace(/ㅔ/g, 'ㅓ').replace(/ㅖ/g, 'ㅓ');
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.style.display = q ? 'block' : 'none';
  if (!q) { searchResults.style.display = 'none'; return; }

  const ql = q.toLowerCase();
  const qp = phoneticNorm(q);

  const matched = allData.filter(d => {
    const fields = [d.name, d.country, d.type,
      d.style || '', d.desc || '',
      d.category || '', d.founded || '',
      d.founder || '', d.flagship || '', d.parent || ''];
    if (fields.some(f => f.includes(q))) return true;
    const kws = d.keywords || [];
    if (kws.some(k => k.toLowerCase().includes(ql) || ql.includes(k.toLowerCase()))) return true;
    if (fields.some(f => phoneticNorm(f).includes(qp))) return true;
    if (kws.some(k => phoneticNorm(k).includes(qp) || qp.includes(phoneticNorm(k)))) return true;
    return false;
  });

  if (matched.length === 0) {
    searchResults.innerHTML = `<div class="no-result">검색 결과가 없습니다</div>`;
  } else {
    searchResults.innerHTML = matched.slice(0, 12).map((d, i) => `
      <div class="search-result-item" data-idx="${i}">
        <div class="result-emoji">${d.emoji}</div>
        <div class="result-info">
          <div class="result-name">${hl(d.name, q)}</div>
          <div class="result-meta">📍 ${d.country}${d.isBrand ? ' · ' + d.category : ' · ' + (d.style||d.type)}</div>
        </div>
        <div class="result-type-badge">${d.isBrand ? '브랜드' : d.type}</div>
      </div>`).join('');

    searchResults.querySelectorAll('.search-result-item').forEach((el, i) => {
      el.addEventListener('click', () => {
        const d = matched[i];
        searchInput.value = d.name;
        searchResults.style.display = 'none';
        searchClear.style.display = 'none';

        // 전체 표시 후 해당 마커로 이동
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-type="all"]').classList.add('active');
        renderMarkers('all');
        setTimeout(() => { flyToMarker(d); openPanel(d); }, 100);
      });
    });
  }
  searchResults.style.display = 'block';
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchResults.style.display = 'none';
  searchClear.style.display = 'none';
  searchInput.focus();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-input-wrap')) {
    searchResults.style.display = 'none';
  }
});

// ── 📷 사진 인식 (Tesseract.js OCR + 네이버 검색 연동) ─────────
const camBtn      = document.getElementById('cam-btn');
const camInput    = document.getElementById('cam-input');
const scanOverlay = document.getElementById('scan-overlay');
const scanLabel   = document.getElementById('scan-label');
const scanPreview = document.getElementById('scan-preview');
const recogResult = document.getElementById('recog-result');
const recogName   = document.getElementById('recog-name');
const recogSub    = document.getElementById('recog-sub');
const recogGoto   = document.getElementById('recog-goto');
const recogNaver  = document.getElementById('recog-naver');

let scanActive = false;

function cancelScan() {
  scanActive = false;
  scanOverlay.classList.remove('active');
}
function closeRecog() { recogResult.classList.remove('active'); }

camBtn.addEventListener('click', () => camInput.click());

// Canvas 전처리: 그레이스케일 + 대비만 (이진화 제거 — 금/은 라벨 대응)
function preprocessForOCR(dataUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onerror = reject;
    img.onload = () => {
      // 최장변 1200px 이내로 조정
      const maxPx = 1200;
      const ratio = Math.min(1, maxPx / Math.max(img.width, img.height, 1));
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * ratio);
      canvas.height = Math.round(img.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.filter = 'grayscale(1) contrast(1.5)';
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL('image/jpeg', 0.92));
    };
    img.src = dataUrl;
  });
}

camInput.addEventListener('change', async () => {
  const file = camInput.files[0];
  if (!file) return;
  camInput.value = '';
  scanActive = true;

  const dataUrl = await new Promise(r => {
    const fr = new FileReader();
    fr.onload = e => r(e.target.result);
    fr.readAsDataURL(file);
  });

  scanPreview.src = dataUrl;
  scanPreview.style.display = 'block';
  scanOverlay.classList.add('active');
  scanLabel.textContent = '🖼️ 이미지 준비 중...';

  try {
    const cleanUrl = await preprocessForOCR(dataUrl).catch(() => dataUrl);

    if (!window.Tesseract) {
      scanLabel.textContent = '⏳ OCR 엔진 로드 중 (최초 1회)...';
      await new Promise((res, rej) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
        s.onload = res; s.onerror = rej;
        document.head.appendChild(s);
      });
    }

    if (!scanActive) return;
    scanLabel.textContent = '🔍 라벨 텍스트 인식 중...';

    const result = await Tesseract.recognize(cleanUrl, 'eng', {
      logger: m => {
        if (m.status === 'recognizing text' && scanActive)
          scanLabel.textContent = `🔍 인식 중... ${Math.round((m.progress||0)*100)}%`;
      }
    });

    if (!scanActive) return;
    scanOverlay.classList.remove('active');

    const rawText = result.data.text.trim();
    const stopWords = new Set([
      'the','and','for','with','from','aged','year','years','old',
      'this','that','our','your','since','product','bottle','single',
      'malt','blended','distilled','matured','content','scotch','whisky',
      'whiskey','aged','limited','edition','reserve','special'
    ]);
    const words = rawText.split(/[\s\n,.|;:()[\]{}@%°#+!]+/)
      .map(w => w.replace(/[^a-zA-Z가-힣]/g, '').trim())
      .filter(w => w.length >= 3 && !stopWords.has(w.toLowerCase()));

    // OCR 결과가 없어도 rawText로 네이버 검색 가능하게
    const labelText = words.slice(0, 8).join(' ') || rawText.slice(0, 60);

    // DB 매칭
    let bestMatch = null, bestScore = 0;
    for (const d of allData) {
      const fields = [d.name, d.category||'', d.type||'', ...(d.keywords||[])];
      let score = 0;
      for (const w of words) {
        const wl = w.toLowerCase();
        if (fields.some(f => {
          const fl = f.toLowerCase();
          return fl.includes(wl) || (wl.length >= 5 && wl.includes(fl.replace(/\s/g,'')));
        })) score += 2;
        else if (words.length <= 4 && fields.some(f => f.toLowerCase().startsWith(wl.slice(0,4)))) score += 1;
      }
      if (score > bestScore) { bestScore = score; bestMatch = d; }
    }

    if (!labelText.trim()) {
      showRecog('텍스트 인식 실패', '라벨이 잘 보이도록 다시 촬영하거나\n아래 네이버 검색 버튼을 눌러보세요.', '술 라벨', null);
    } else if (bestMatch && bestScore >= 3) {
      showRecog(bestMatch.name, `📝 라벨: "${labelText}"`, labelText, bestMatch);
    } else if (bestMatch && bestScore >= 1) {
      showRecog(bestMatch.name + ' (?)', `📝 라벨: "${labelText}"\n유사한 항목을 찾았습니다. 확인해보세요.`, labelText, bestMatch);
    } else {
      showRecog('DB에 없는 술', `📝 라벨: "${labelText}"`, labelText, null);
    }

  } catch (err) {
    if (!scanActive) return;
    scanOverlay.classList.remove('active');
    showRecog('인식 오류', `오류: ${err.message}\n네이버에서 직접 검색해보세요.`, '술', null);
  }
});

function showRecog(name, sub, labelText, matchedData) {
  recogName.textContent = name;
  recogSub.textContent = sub;

  // 네이버 검색 + 파파고 번역 링크
  const nq = encodeURIComponent((labelText || name) + ' 술');
  recogNaver.href = `https://search.naver.com/search.naver?query=${nq}`;

  if (matchedData) {
    recogGoto.style.display = 'block';
    recogGoto.onclick = () => {
      closeRecog();
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector('[data-type="all"]').classList.add('active');
      renderMarkers('all');
      setTimeout(() => { flyToMarker(matchedData); openPanel(matchedData); }, 100);
    };
  } else {
    recogGoto.style.display = 'none';
  }

  recogResult.classList.add('active');
}
</script>
