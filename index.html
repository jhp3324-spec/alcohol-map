<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>세계 술 원산지 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    header h1 span { color: #f4a261; }

    .filter-bar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px 20px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1.5px solid #444;
      background: transparent;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover { border-color: #f4a261; color: #f4a261; }
    .filter-btn.active { background: #f4a261; border-color: #f4a261; color: #1a1a2e; font-weight: 700; }

    #map {
      flex: 1;
      width: 100%;
    }

    /* 팝업 커스텀 */
    .leaflet-popup-content-wrapper {
      background: #1e1e3a;
      border: 1px solid #f4a261;
      border-radius: 12px;
      color: #eee;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .leaflet-popup-tip { background: #1e1e3a; }
    .leaflet-popup-close-button { color: #aaa !important; }

    .popup-content {
      min-width: 200px;
      padding: 4px 0;
    }

    .popup-emoji { font-size: 36px; text-align: center; margin-bottom: 6px; }

    .popup-name {
      font-size: 17px;
      font-weight: 700;
      color: #f4a261;
      text-align: center;
      margin-bottom: 3px;
    }

    .popup-origin {
      font-size: 12px;
      color: #aaa;
      text-align: center;
      margin-bottom: 10px;
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 3px 0;
      border-bottom: 1px solid #333;
      color: #ccc;
    }

    .popup-row:last-child { border-bottom: none; }
    .popup-row span:first-child { color: #888; }

    .popup-desc {
      font-size: 12px;
      color: #bbb;
      margin-top: 8px;
      line-height: 1.7;
    }

    .popup-tag {
      display: inline-block;
      background: #f4a261;
      color: #1a1a2e;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
    }

    /* 범례 */
    .legend {
      position: fixed;
      bottom: 30px;
      left: 20px;
      background: rgba(26,26,46,0.93);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      z-index: 1000;
      min-width: 120px;
    }

    .legend h4 { font-size: 12px; color: #f4a261; margin-bottom: 8px; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      color: #ccc;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* 카운트 뱃지 */
    .count-badge {
      background: #f4a261;
      color: #1a1a2e;
      border-radius: 10px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      margin-left: 6px;
    }

    /* 검색 */
    .search-bar {
      padding: 8px 20px;
      background: #16213e;
      border-bottom: 1px solid #2a2a4a;
      flex-shrink: 0;
      position: relative;
    }

    .search-input-wrap {
      position: relative;
      max-width: 400px;
    }

    .search-input-wrap input {
      width: 100%;
      padding: 9px 36px 9px 36px;
      background: #0f0f23;
      border: 1.5px solid #444;
      border-radius: 24px;
      color: #eee;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input-wrap input:focus { border-color: #f4a261; }
    .search-input-wrap input::placeholder { color: #666; }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #888;
      font-size: 16px;
      cursor: pointer;
      display: none;
      line-height: 1;
    }

    /* 검색 결과 드롭다운 */
    .search-results {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      width: 100%;
      max-width: 400px;
      background: #1e1e3a;
      border: 1px solid #f4a261;
      border-radius: 12px;
      max-height: 280px;
      overflow-y: auto;
      z-index: 2000;
      display: none;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #2a2a4a;
      transition: background 0.15s;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #2a2a4a; }

    .result-emoji { font-size: 22px; flex-shrink: 0; }

    .result-info { flex: 1; min-width: 0; }

    .result-name {
      font-size: 14px;
      color: #eee;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .result-name mark {
      background: none;
      color: #f4a261;
      font-weight: 700;
    }

    .result-meta {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    .result-type-badge {
      font-size: 10px;
      background: #333;
      color: #ccc;
      padding: 2px 7px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .no-result {
      padding: 18px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>

<header>
  <h1>🍷 세계 <span>술 원산지</span> 지도</h1>
  <div style="font-size:12px;color:#888;">마커 클릭 시 상세 정보</div>
</header>

<div class="search-bar">
  <div class="search-input-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="술 이름, 나라, 종류로 검색...">
    <button class="search-clear" id="search-clear">✕</button>
    <div class="search-results" id="search-results"></div>
  </div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" data-type="all">전체 <span class="count-badge" id="cnt-all">0</span></button>
  <button class="filter-btn" data-type="맥주">🍺 맥주</button>
  <button class="filter-btn" data-type="와인">🍷 와인</button>
  <button class="filter-btn" data-type="위스키">🥃 위스키</button>
  <button class="filter-btn" data-type="소주·청주">🍶 소주·청주</button>
  <button class="filter-btn" data-type="증류주">🥂 증류주</button>
  <button class="filter-btn" data-type="전통주">🏺 전통주</button>
</div>

<div id="map"></div>

<div class="legend">
  <h4>종류별 색상</h4>
  <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div>맥주</div>
  <div class="legend-item"><div class="legend-dot" style="background:#dc2626"></div>와인</div>

  <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>소주·청주</div>
  <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>증류주</div>
  <div class="legend-item"><div class="legend-dot" style="background:#059669"></div>전통주</div>
</div>

// 지도 초기화
const map = L.map('map', { center: [25, 15], zoom: 2, minZoom: 1 });

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 18
}).addTo(map);

let markers = [];

function createMarker(d) {
  const icon = L.divIcon({
    className: '',
    html: `<div style="
      background:${d.color};
      border:2px solid white;
      border-radius:50%;
      width:28px;height:28px;
      display:flex;align-items:center;justify-content:center;
      font-size:14px;
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
      cursor:pointer;
    ">${d.emoji}</div>`,
    iconSize: [28, 28],
    iconAnchor: [14, 14]
  });

  const marker = L.marker([d.lat, d.lng], { icon })
    .bindPopup(`
      <div class="popup-content">
        <div class="popup-emoji">${d.emoji}</div>
        <div class="popup-tag">${d.type}</div>
        <div class="popup-name">${d.name}</div>
        <div class="popup-origin">📍 ${d.country}</div>
        <div class="popup-row"><span>종류</span><span>${d.style}</span></div>
        <div class="popup-row"><span>도수</span><span>${d.abv}</span></div>
        <div class="popup-desc">${d.desc}</div>
      </div>
    `, { maxWidth: 240 });

  marker._drinkType = d.type;
  return marker;
}

function renderMarkers(type) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  drinks.forEach(d => {
    if (type === 'all' || d.type === type) {
      const m = createMarker(d);
      m.addTo(map);
      markers.push(m);
    }
  });
}

// 필터 버튼
document.getElementById('cnt-all').textContent = drinks.length;
renderMarkers('all');

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderMarkers(btn.dataset.type);
    // 검색 초기화
    document.getElementById('search-input').value = '';
    document.getElementById('search-results').style.display = 'none';
    document.getElementById('search-clear').style.display = 'none';
  });
});

// 검색 기능
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');
const searchClear = document.getElementById('search-clear');

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function flyToMarker(d) {
  // 해당 마커 찾아서 팝업 열기
  markers.forEach(m => {
    const ll = m.getLatLng();
    if (Math.abs(ll.lat - d.lat) < 0.01 && Math.abs(ll.lng - d.lng) < 0.01) {
      map.flyTo([d.lat, d.lng], 5, { duration: 1 });
      setTimeout(() => m.openPopup(), 1000);
    }
  });
}

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim();
  searchClear.style.display = q ? 'block' : 'none';

  if (!q) {
    searchResults.style.display = 'none';
    return;
  }

  const matched = drinks.filter(d =>
    d.name.includes(q) || d.country.includes(q) ||
    d.type.includes(q) || d.style.includes(q) || d.desc.includes(q)
  );

  if (matched.length === 0) {
    searchResults.innerHTML = `<div class="no-result">검색 결과가 없습니다</div>`;
  } else {
    searchResults.innerHTML = matched.map(d => `
      <div class="search-result-item" data-lat="${d.lat}" data-lng="${d.lng}" data-name="${d.name}">
        <div class="result-emoji">${d.emoji}</div>
        <div class="result-info">
          <div class="result-name">${highlight(d.name, q)}</div>
          <div class="result-meta">📍 ${d.country} · 도수 ${d.abv}</div>
        </div>
        <div class="result-type-badge">${d.type}</div>
      </div>
    `).join('');

    searchResults.querySelectorAll('.search-result-item').forEach((el, i) => {
      el.addEventListener('click', () => {
        const d = matched[i];
        searchInput.value = d.name;
        searchResults.style.display = 'none';

        // 전체 마커 표시 후 해당 마커로 이동
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-type="all"]').classList.add('active');
        renderMarkers('all');
        setTimeout(() => flyToMarker(d), 100);
      });
    });
  }

  searchResults.style.display = 'block';
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchResults.style.display = 'none';
  searchClear.style.display = 'none';
  searchInput.focus();
});

// 바깥 클릭 시 결과 닫기
document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-input-wrap')) {
    searchResults.style.display = 'none';
  }
});
</script>
